<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElitePay</title>
    
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/akalanka929-eng/pay-summary-repo/main/Def%2006.ico">
    
    <style>
        /* මුළු පිටුවම අඳුරු වර්ණයට හැරවීම */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            overflow: hidden; 
            display: flex;
            background-color: #121212; /* Dark Mode Background */
            color: #ffffff;
        }

        /* වම් පස ඇති Web App එක */
        .container {
            flex: 1;
            height: 100vh;
            background-color: #121212;
        }

        iframe { 
            width: 100%; 
            height: 100%; 
            border: none;
        }

        /* දකුණු පස ඇති පින්තූර කොටස */
        .side-image {
            width: 300px; 
            height: 100vh;
            background-color: #1a1a1a; 
            display: flex;
            align-items: center;
            justify-content: center;
            border-left: 1px solid #333; 
            padding: 15px;
            box-sizing: border-box;
        }

        .side-image img {
            max-width: 100%;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0px 4px 10px rgba(0,0,0,0.5));
        }

        /* Mobile දුරකථන වලදී */
        @media (max-width: 768px) {
            .side-image { display: none; }
        }
    </style>
</head>
<body>

    <div class="container">
        <iframe src="https://script.google.com/macros/s/AKfycbwcWlsSZ0rHnVbOPq6RUnDl_FGNihr_6Y7aZw-M12VxQQq8sDtzEnuFso0DvosnqPO4/exec"></iframe>
    </div>

    <div class="side-image">
        <img src="https://raw.githubusercontent.com/akalanka929-eng/pay-summary-repo/main/Untitled%20design%20(2).png" alt="Side Image">
    </div>

</body>
</html>
