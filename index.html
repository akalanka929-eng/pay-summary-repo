<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElitePay</title>
    
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/akalanka929-eng/pay-summary-repo/main/Def%2006.ico">
    
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            background-color: #121212; /* Dark Mode Background */
            overflow: hidden; 
            font-family: Arial, sans-serif;
        }

        /* Splash Screen */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #121212;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease-out;
        }

        /* විශාල කරන ලද වෘත්තාකාර රාමුව */
        .circle-frame {
            width: 850px;      /* පෙර 280 -> 350 දක්වා විශාල කර ඇත */
            height: 850px;     /* සමාන උසක් */
            border-radius: 50%; /* සම්පූර්ණ වෘත්තයක් */
            overflow: hidden;   /* රාමුවෙන් පිටත කොටස් සඟවයි */
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #1e1e2f; /* රාමුවේ පසුබිම */
            box-shadow: 0px 0px 40px rgba(255, 255, 255, 0.25); /* දීප්තිය තරමක් වැඩි කර ඇත */
            border: 4px solid rgba(255, 255, 255, 0.2); /* මායිම තරමක් ඝන කර ඇත */
        }

        /* රූපය වෘත්තයට සරිලන ලෙස සකසන්න */
        .circle-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;  /* GIF එක රාමුව පුරා වටවීමට */
            display: block;
        }

        /* Web App එක පෙන්වන කොටස */
        #app-container {
            width: 100%;
            height: 100vh;
            display: none; /* ආරම්භයේදී සඟවා තබයි */
        }

        iframe { 
            width: 100%; 
            height: 100%; 
            border: none;
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="https://raw.githubusercontent.com/akalanka929-eng/iresha-akalanka/main/SL%20Gif%202.gif" alt="Loading Logo">
    </div>

    <div id="app-container">
        <iframe src="https://script.google.com/macros/s/AKfycbwcWlsSZ0rHnVbOPq6RUnDl_FGNihr_6Y7aZw-M12VxQQq8sDtzEnuFso0DvosnqPO4/exec"></iframe>
    </div>

    <script>
        // තත්පර 2කට (2000ms) පසු ක්‍රියාත්මක වේ
        setTimeout(function() {
            var splash = document.getElementById('splash-screen');
            var app = document.getElementById('app-container');

            // පින්තූරය මැකී යන ලෙස පෙන්වීමට (Fade out)
            splash.style.opacity = '0';

            // Animation එක අවසන් වූ පසු පින්තූරය ඉවත් කර App එක පෙන්වීම
            setTimeout(function() {
                splash.style.display = 'none';
                app.style.display = 'block';
            }, 500); // 0.5s fade out කාලය

        }, 6000); // තත්පර 3ක කාලය
    </script>

</body>
</html>
