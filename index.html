<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElitePay</title>
    
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/akalanka929-eng/pay-summary-repo/main/Def%2006.ico">
    
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            background-color: #121212; 
            overflow: hidden; 
            font-family: Arial, sans-serif;
        }

        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #121212;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease-out;
        }

        #splash-screen img {
            max-width: 80%;
            max-height: 80%;
            object-fit: contain;
            /* පින්තූරය පැහැදිලිව පෙනීමට shadow එකක් */
            filter: drop-shadow(0px 0px 20px rgba(255,255,255,0.2));
        }

        #app-container {
            width: 100%;
            height: 100vh;
            display: none;
        }

        iframe { 
            width: 100%; 
            height: 100%; 
            border: none;
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="https://raw.githubusercontent.com/akalanka929-eng/pay-summary-repo/main/Gemini_Generated_Image_3zfsc13zfsc13zfs%20(1)%20(1).png" alt="Loading Logo">
    </div>

    <div id="app-container">
        <iframe src="https://script.google.com/macros/s/AKfycbwcWlsSZ0rHnVbOPq6RUnDl_FGNihr_6Y7aZw-M12VxQQq8sDtzEnuFso0DvosnqPO4/exec"></iframe>
    </div>

    <script>
        window.onload = function() {
            // තත්පර 3කට පසු Splash screen එක ඉවත් කිරීම
            setTimeout(function() {
                var splash = document.getElementById('splash-screen');
                var app = document.getElementById('app-container');

                splash.style.opacity = '0';

                setTimeout(function() {
                    splash.style.display = 'none';
                    app.style.display = 'block';
                }, 500);

            }, 2000); 
        };
    </script>

</body>
</html>
